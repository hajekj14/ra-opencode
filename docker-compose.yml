services:
  opencode-pilot:
    image: ${OPENCODE_IMAGE:-ghcr.io/your-org/opencode-web:latest}
    container_name: opencode-pilot
    restart: unless-stopped
    entrypoint:
      - /bin/sh
      - -lc
      - /usr/local/bin/init-repo.sh && exec /usr/local/bin/start-opencode.sh
    ports:
      - "${OPENCODE_BIND_ADDRESS:-127.0.0.1}:${OPENCODE_PORT:-4096}:4096"
    environment:
      HOME: /home/opencode
      WORKSPACE_ROOT: /workspace
      OPENCODE_PORT: ${OPENCODE_PORT:-4096}
      OPENCODE_CONFIG: /etc/opencode/opencode.jsonc
      OPENCODE_SERVER_USERNAME: ${OPENCODE_SERVER_USERNAME:-opencode}
      OPENCODE_SERVER_PASSWORD: ${OPENCODE_SERVER_PASSWORD:-change-me}
      AZURE_FOUNDRY_BASE_URL: ${AZURE_FOUNDRY_BASE_URL:-https://your-azure-foundry-endpoint.example.com/v1}
      AZURE_FOUNDRY_API_KEY: ${AZURE_FOUNDRY_API_KEY:-change-me}
      GITLAB_REPO_URL: ${GITLAB_REPO_URL:-https://gitlab.example.com/group/project.git}
      GITLAB_REPO_DIR: ${GITLAB_REPO_DIR:-project}
      GITLAB_USERNAME: ${GITLAB_USERNAME:-git}
      GITLAB_TOKEN: ${GITLAB_TOKEN:-change-me}
    volumes:
      - opencode-pilot-workspace:/workspace
      - opencode-pilot-home:/home/opencode
      - ./docker/opencode.jsonc:/etc/opencode/opencode.jsonc:ro

volumes:
  opencode-pilot-workspace:
  opencode-pilot-home: