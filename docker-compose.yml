x-opencode-instance: &opencode-instance
  build:
    context: .
    dockerfile: Dockerfile
    args:
      OPENCODE_VERSION: ${OPENCODE_VERSION:-v1.14.18}
  image: ${OPENCODE_IMAGE:-opencode-glibc:latest}
  restart: unless-stopped
  init: true
  working_dir: /workspace
  environment: &opencode-instance-env
    HOME: /home/opencode
    SHELL: /bin/bash
  healthcheck:
    test: ["CMD-SHELL", "auth=\"$$(printf '%s:%s' \"$$OPENCODE_SERVER_USERNAME\" \"$$OPENCODE_SERVER_PASSWORD\" | base64 | tr -d '\\n')\"; wget -q -O /dev/null --header=\"Authorization: Basic $$auth\" http://127.0.0.1:4096/global/health || exit 1"]
    interval: 30s
    timeout: 5s
    retries: 5
    start_period: 20s

services:
  hajekj14:
    <<: *opencode-instance
    container_name: opencode-hajekj14
    hostname: opencode-hajekj14
    ports:
      - "${OPENCODE_BIND_ADDRESS_HAJEKJ14:-127.0.0.1}:${OPENCODE_HOST_PORT_HAJEKJ14:-4096}:4096"
    environment:
      <<: *opencode-instance-env
      OPENCODE_SERVER_USERNAME: ${OPENCODE_SERVER_USERNAME_HAJEKJ14:-hajekj14}
      OPENCODE_SERVER_PASSWORD: ${OPENCODE_SERVER_PASSWORD_HAJEKJ14:-change-me}
    cpus: ${OPENCODE_MAX_CPUS_HAJEKJ14:-2.0}
    mem_limit: ${OPENCODE_MAX_MEMORY_HAJEKJ14:-4g}
    memswap_limit: ${OPENCODE_MAX_MEMORY_HAJEKJ14:-4g}
    pids_limit: ${OPENCODE_MAX_PIDS_HAJEKJ14:-512}
    volumes:
      - hajekj14-home:/home/opencode
      - hajekj14-workspace:/workspace
      - ${OPENCODE_DOCKER_SOCKET:-/var/run/docker.sock}:/var/run/docker.sock

volumes:
  hajekj14-home:
  hajekj14-workspace:

