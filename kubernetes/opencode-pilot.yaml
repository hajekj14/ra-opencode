apiVersion: v1
kind: Namespace
metadata:
  name: opencode-pilot
---
apiVersion: v1
kind: Secret
metadata:
  name: opencode-pilot-secrets
  namespace: opencode-pilot
type: Opaque
stringData:
  OPENCODE_SERVER_USERNAME: opencode
  OPENCODE_SERVER_PASSWORD: change-me
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: opencode-pilot-workspace
  namespace: opencode-pilot
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
  storageClassName: default
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: opencode-pilot-home
  namespace: opencode-pilot
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: default
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: opencode-pilot
  namespace: opencode-pilot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: opencode-pilot
  template:
    metadata:
      labels:
        app: opencode-pilot
    spec:
      containers:
        - name: opencode
          image: ghcr.io/anomalyco/opencode:latest
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -lc
            - |
              set -eu
              if ! command -v git >/dev/null 2>&1 || ! command -v bash >/dev/null 2>&1 || ! command -v ssh >/dev/null 2>&1 || [ ! -e /lib/ld-linux-x86-64.so.2 ]; then
                apk add --no-cache bash ca-certificates gcompat git openssh-client
              fi
              mkdir -p "$HOME" /workspace
              exec opencode web --hostname 0.0.0.0 --port "$OPENCODE_PORT"
          ports:
            - name: http
              containerPort: 4096
          env:
            - name: HOME
              value: /home/opencode
            - name: OPENCODE_PORT
              value: "4096"
            - name: SHELL
              value: /bin/bash
            - name: OPENCODE_SERVER_USERNAME
              valueFrom:
                secretKeyRef:
                  name: opencode-pilot-secrets
                  key: OPENCODE_SERVER_USERNAME
            - name: OPENCODE_SERVER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: opencode-pilot-secrets
                  key: OPENCODE_SERVER_PASSWORD
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -lc
                - |
                  auth="$(printf '%s:%s' "$OPENCODE_SERVER_USERNAME" "$OPENCODE_SERVER_PASSWORD" | base64 | tr -d '\n')"
                  wget -q -O /dev/null --header="Authorization: Basic $auth" http://127.0.0.1:4096/global/health
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -lc
                - |
                  auth="$(printf '%s:%s' "$OPENCODE_SERVER_USERNAME" "$OPENCODE_SERVER_PASSWORD" | base64 | tr -d '\n')"
                  wget -q -O /dev/null --header="Authorization: Basic $auth" http://127.0.0.1:4096/global/health
            initialDelaySeconds: 45
            periodSeconds: 20
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 4Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
          volumeMounts:
            - name: workspace
              mountPath: /workspace
            - name: home
              mountPath: /home/opencode
      volumes:
        - name: workspace
          persistentVolumeClaim:
            claimName: opencode-pilot-workspace
        - name: home
          persistentVolumeClaim:
            claimName: opencode-pilot-home
---
apiVersion: v1
kind: Service
metadata:
  name: opencode-pilot
  namespace: opencode-pilot
  annotations:
    service.beta.kubernetes.io/azure-load-balancer-internal: "true"
spec:
  type: LoadBalancer
  selector:
    app: opencode-pilot
  ports:
    - name: http
      port: 80
      targetPort: http